<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Farmacia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D1F15;
    --surface: #132B1C;
    --surface2: #1A3825;
    --accent: #3DFF8A;
    --accent-dim: #1A6638;
    --text: #E8F5EE;
    --text-muted: #7AAB8A;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid #1E4030;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .logo-dot {
    width: 9px; height: 9px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    flex-shrink: 0;
  }
  h1 { font-size: 17px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
  h1 span { color: var(--accent); }
  .search-wrap { position: relative; }
  #searchInput {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--accent-dim);
    border-radius: var(--radius);
    padding: 13px 44px 13px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #searchInput::placeholder { color: var(--text-muted); }
  #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #3DFF8A18; }
  .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 17px; pointer-events: none; }
  .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; padding: 4px; display: none; line-height: 1; }
  .clear-btn:hover { color: var(--accent); }
  .stats-bar {
    display: flex; gap: 12px; padding: 10px 20px;
    background: var(--surface); border-bottom: 1px solid #1E4030;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted);
    align-items: center;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat strong { color: var(--accent); }
  #results { padding: 16px 16px 0; display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--surface);
    border: 1px solid #1E4030;
    border-radius: var(--radius);
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color .15s, transform .1s;
    animation: fadeIn .15s ease both;
  }
  .card:hover { border-color: var(--accent-dim); transform: translateX(2px); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
  .sector-badge {
    min-width: 46px; height: 46px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    letter-spacing: .03em; flex-shrink: 0;
  }
  .sector-badge.psi  { background: #FF6B6B18; color: #FF6B6B; border: 1px solid #FF6B6B44; }
  .sector-badge.col  { background: #74C0FC18; color: #74C0FC; border: 1px solid #74C0FC44; }
  .sector-badge.gen  { background: #3DFF8A18; color: #3DFF8A; border: 1px solid #3DFF8A44; }
  .card-body { flex: 1; min-width: 0; }
  .card-comercial {
    font-size: 14px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px; text-transform: capitalize;
  }
  .card-generico {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
  }
  .card-meta { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .tag-estante { background: var(--surface2); color: var(--text-muted); }
  .tag-psi { background: #FF6B6B15; color: #FF9A9A; }
  .match-highlight { color: var(--accent); font-weight: 700; }
  .card-location { text-align: right; flex-shrink: 0; }
  .location-main { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 2px; }
  .location-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .big { font-size: 36px; margin-bottom: 10px; }
  .empty-state h3 { font-size: 15px; margin-bottom: 5px; color: var(--text); }
  .empty-state p { font-size: 12px; font-family: 'DM Mono', monospace; }
  .legend { padding: 20px 16px 0; }
  .legend-title { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .legend-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .legend-pill {
    background: var(--surface); border: 1px solid #1E4030; border-radius: 7px;
    padding: 5px 10px; font-family: 'DM Mono', monospace; font-size: 10px;
    display: flex; align-items: center; gap: 5px; cursor: pointer; transition: border-color .15s;
  }
  .legend-pill:hover { border-color: var(--accent-dim); }
  .legend-pill.active { border-color: var(--accent); background: #3DFF8A12; }
  .legend-key { color: var(--accent); font-weight: 500; }
  .legend-val { color: var(--text-muted); }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo-dot"></div>
    <h1>Mapa <span>Farmacia</span></h1>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar medicamento..." autocomplete="off" autocorrect="off" spellcheck="false">
    <span class="search-icon" id="searchIcon">&#9906;</span>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">&#215;</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><strong id="totalCount">0</strong> medicamentos</div>
  <div class="stat">&#183;</div>

  <div id="searchStat" class="stat" style="display:none">&#183; <strong id="matchCount">0</strong> resultados</div>
</div>

<div class="legend" id="legendSection">
  <div class="legend-title">Filtrar por sector</div>
  <div class="legend-grid" id="legendGrid"></div>
</div>

<div id="results"></div>

let activeFilter = null;

function sectorClass(s) {
  if (s === 'PSI') return 'psi';
  if (s === 'COL') return 'col';
  return 'gen';
}

function cap(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function esc(str) {
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc(text).replace(re, '<span class="match-highlight">$1</span>');
}

function render(query) {
  const q = (query || '').toLowerCase().trim();
  const container = document.getElementById('results');

  let filtered = DATA;
  if (activeFilter) filtered = filtered.filter(d => d.s === activeFilter);
  if (q) filtered = filtered.filter(d =>
    d.c.toLowerCase().includes(q) ||
    d.g.toLowerCase().includes(q) ||
    d.s.toLowerCase().includes(q)
  );

  document.getElementById('totalCount').textContent = DATA.length;
  const sectors = [...new Set(DATA.map(d => d.s))];
  document.getElementById('sectorCount').textContent = sectors.length;

  const searchStat = document.getElementById('searchStat');
  if (q || activeFilter) {
    searchStat.style.display = '';
    document.getElementById('matchCount').textContent = filtered.length;
  } else {
    searchStat.style.display = 'none';
  }

  renderLegend(sectors, q);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="big">&#128269;</div><h3>Sin resultados</h3><p>Prob&#225; con otro nombre o sector</p></div>`;
    return;
  }

  container.innerHTML = filtered.map((d, i) => {
    const sc = sectorClass(d.s);
    const locStr = d.e ? d.s + '&#183;' + d.e : d.s;
    const isPsi = d.s === 'PSI';
    const estTag = d.e ? `<span class="tag tag-estante">Estante ${esc(d.e)}</span>` : '';
    const psiTag = isPsi ? `<span class="tag tag-psi">&#128274; Receta especial</span>` : '';
    const genLine = d.g ? `<div class="card-generico">${highlight(d.g, q)}</div>` : '';
    return `<div class="card" style="animation-delay:${Math.min(i*0.025,0.3)}s">
      <div class="sector-badge ${sc}">${esc(d.s)}</div>
      <div class="card-body">
        <div class="card-comercial">${highlight(d.c, q)}</div>
        ${genLine}
        <div class="card-meta">${estTag}${psiTag}</div>
      </div>
      <div class="card-location">
        <div class="location-main">${locStr}</div>
        <div class="location-label">ubicaci&#243;n</div>
      </div>
    </div>`;
  }).join('');
}

function renderLegend(sectors, q) {
  const grid = document.getElementById('legendGrid');
  grid.innerHTML = sectors.sort().map(s => {
    const count = DATA.filter(d => d.s === s).length;
    const active = activeFilter === s ? ' active' : '';
    return `<div class="legend-pill${active}" onclick="toggleFilter('${s}')">
      <span class="legend-key">${s}</span>
      <span class="legend-val">${count}</span>
    </div>`;
  }).join('');
}

function toggleFilter(s) {
  activeFilter = activeFilter === s ? null : s;
  render(document.getElementById('searchInput').value);
}

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const searchIcon = document.getElementById('searchIcon');

input.addEventListener('input', () => {
  const q = input.value;
  clearBtn.style.display = q ? 'block' : 'none';
  searchIcon.style.display = q ? 'none' : 'block';
  render(q);
});

function clearSearch() {
  input.value = '';
  clearBtn.style.display = 'none';
  searchIcon.style.display = 'block';
  input.focus();
  render('');
}

render('');
input.focus();
</script>
